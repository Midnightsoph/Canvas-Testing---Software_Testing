<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Canvas LMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin()">
<div class="app-layout">
    <nav>
        <div class="nav-brand">Canvas LMS</div>
        <a id="navDashboard" href="dashboard.html">🏠 Dashboard</a>
        <a id="navCourses" href="courses.html">📚 Courses</a>
        <a id="navAssignments" href="assignments.html">📝 Assignments</a>
        <a id="navCalendar" href="calendar.html">📅 Calendar</a>
        <a id="navInbox" href="inbox.html">✉️ Inbox</a>
        <a id="navProfile" href="profile.html">👤 Profile</a>
        <a id="logoutLink" href="#" onclick="logout()">🚪 Logout</a>
    </nav>

    <div class="main-content">
        <div class="page-container">
            <div class="page-header">
                <h1 id="profileTitle">Profile Settings</h1>
                <p>Manage your personal and academic information.</p>
            </div>

            <div class="profile-box">
                <p id="profileName">Name: Student User</p>
                <p id="profileEmail">Email: student@test.com</p>
                <p id="profileMajor">Major: Software Engineering</p>
            </div>

            <div class="list-card" style="margin-top: 20px;">
                <h3>Edit Profile</h3>
                <input type="text" id="editName" placeholder="Enter name">
                <input type="text" id="editEmail" placeholder="Enter email">
                <input type="text" id="editMajor" placeholder="Enter major">
                <button id="saveProfileButton" onclick="saveProfile()">Save Changes</button>
                <p id="profileStatus"></p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
